name: Database Backup

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 3 AM UTC
  workflow_dispatch: # Manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Dump database and upload to S3
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
            BACKUP_FILE="thedailymixa_${TIMESTAMP}.sql.gz"

            DB_URL=$(grep DATABASE_URL /var/www/thedailymixa/.env | cut -d= -f2-)
            DB_USER=$(echo "$DB_URL" | sed -n 's|mysql://\([^:]*\):.*|\1|p')
            DB_PASS=$(echo "$DB_URL" | sed -n 's|mysql://[^:]*:\([^@]*\)@.*|\1|p')
            DB_NAME=$(echo "$DB_URL" | sed -n 's|.*/\([^?]*\).*|\1|p')

            mysqldump -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" --single-transaction --routines --triggers | gzip > "/tmp/${BACKUP_FILE}"
            aws s3 cp "/tmp/${BACKUP_FILE}" "s3://${{ secrets.AWS_S3_BUCKET_NAME }}/backups/${BACKUP_FILE}"
            aws s3 ls "s3://${{ secrets.AWS_S3_BUCKET_NAME }}/backups/" | sort | head -n -30 | awk '{print $4}' | while read file; do
              aws s3 rm "s3://${{ secrets.AWS_S3_BUCKET_NAME }}/backups/$file"
            done
            rm -f "/tmp/${BACKUP_FILE}"
