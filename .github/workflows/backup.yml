name: Database Backup

on:
  schedule:
    - cron: "0 3 * * 0" # Weekly on Sunday at 3 AM UTC
  workflow_dispatch: # Manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Dump TiDB database
        run: |
          TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
          BACKUP_FILE="thedailymixa_${TIMESTAMP}.sql.gz"
          mkdir -p backups

          DB_URL="${{ secrets.DATABASE_URL }}"
          DB_USER=$(echo "$DB_URL" | sed -n 's|mysql://\([^:]*\):.*|\1|p')
          DB_PASS=$(echo "$DB_URL" | sed -n 's|mysql://[^:]*:\([^@]*\)@.*|\1|p')
          DB_HOST=$(echo "$DB_URL" | sed -n 's|mysql://[^@]*@\([^:]*\):.*|\1|p')
          DB_PORT=$(echo "$DB_URL" | sed -n 's|mysql://[^:]*:[^@]*@[^:]*:\([^/]*\)/.*|\1|p')
          DB_NAME=$(echo "$DB_URL" | sed -n 's|.*/\([^?]*\).*|\1|p')

          mysqldump -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" \
            --ssl-mode=REQUIRED --skip-lock-tables --no-tablespaces \
            "$DB_NAME" | gzip > "backups/${BACKUP_FILE}"

          # Keep only last 4 backups
          ls -t backups/*.sql.gz | tail -n +5 | xargs -r rm

      - name: Commit and push backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git commit -m "backup: weekly database backup $(date +%Y-%m-%d)" || echo "No changes"
          git push
