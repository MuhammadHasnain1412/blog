name: Database Backup

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 3 AM UTC
  workflow_dispatch: # Manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Dump database
        run: |
          TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
          mysqldump -h ${{ secrets.DB_HOST }} \
            -u ${{ secrets.DB_USER }} \
            -p'${{ secrets.DB_PASSWORD }}' \
            ${{ secrets.DB_NAME }} \
            --single-transaction \
            --routines \
            --triggers | gzip > "thedailymixa_${TIMESTAMP}.sql.gz"
          echo "BACKUP_FILE=thedailymixa_${TIMESTAMP}.sql.gz" >> $GITHUB_ENV

      - name: Upload to S3
        run: |
          aws s3 cp "${{ env.BACKUP_FILE }}" \
            "s3://${{ secrets.AWS_S3_BUCKET_NAME }}/backups/${{ env.BACKUP_FILE }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_S3_REGION }}

      - name: Clean up old backups (keep last 30)
        run: |
          aws s3 ls "s3://${{ secrets.AWS_S3_BUCKET_NAME }}/backups/" \
            | sort | head -n -30 \
            | awk '{print $4}' \
            | while read file; do
                aws s3 rm "s3://${{ secrets.AWS_S3_BUCKET_NAME }}/backups/$file"
              done
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_S3_REGION }}
